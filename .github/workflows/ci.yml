name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Remove tracked node_modules from checkout
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run cy:run -- --spec "cypress/e2e/api/**/*.cy.ts" --env environment=ciApi
